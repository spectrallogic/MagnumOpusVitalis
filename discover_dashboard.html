<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blind Brain Discovery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050608;color:#fff;font-family:'Courier New',monospace;overflow:hidden;height:100vh}
.app{display:grid;grid-template-columns:1fr 320px;height:100vh}
#cw{position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
.sb{background:rgba(0,0,0,.6);border-left:.5px solid rgba(232,168,56,.08);display:flex;flex-direction:column;overflow-y:auto;padding:12px;gap:8px}
.title{font-size:12px;color:rgba(232,168,56,.8);letter-spacing:2px}
.sub{font-size:7px;color:rgba(232,168,56,.2);letter-spacing:1px}
.sec{margin-bottom:2px}
.st{font-size:7px;color:rgba(232,168,56,.25);letter-spacing:1px;margin-bottom:4px}
.pbar{height:2px;background:rgba(232,168,56,.05);border-radius:1px;overflow:hidden}
.pfill{height:100%;background:rgba(232,168,56,.4);transition:width .3s}
.log{font-size:7px;color:rgba(232,168,56,.2);max-height:80px;overflow-y:auto;padding:4px}
.le{padding:1px 0}
.dl{max-height:140px;overflow-y:auto}
.di{display:flex;align-items:center;gap:3px;padding:1px 0;font-size:7px;color:rgba(232,168,56,.3);cursor:pointer}
.di:hover{color:rgba(232,168,56,.7)}
.dd{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.btn{display:block;width:100%;background:rgba(232,168,56,.05);border:.5px solid rgba(232,168,56,.12);border-radius:3px;padding:8px;font-size:10px;color:rgba(232,168,56,.5);cursor:pointer;font-family:'Courier New',monospace;text-align:center}
.btn:hover{background:rgba(232,168,56,.1);color:rgba(232,168,56,.8)}
.btn:disabled{opacity:.2;cursor:default}
.chat-wrap{flex:1;display:none;flex-direction:column;border:.5px solid rgba(232,168,56,.06);border-radius:3px;overflow:hidden;min-height:200px}
.chat-h{padding:5px 8px;font-size:7px;color:rgba(232,168,56,.25);letter-spacing:1px;border-bottom:.5px solid rgba(232,168,56,.04)}
.chat-m{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px}
.msg{max-width:88%;padding:5px 8px;border-radius:5px;font-size:9px;line-height:1.4;word-wrap:break-word}
.mu{align-self:flex-end;background:rgba(232,168,56,.07);border:.5px solid rgba(232,168,56,.12);color:rgba(232,168,56,.65)}
.ma{align-self:flex-start;background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.06);color:rgba(255,255,255,.55)}
.ms{align-self:center;font-size:7px;color:rgba(232,168,56,.2);font-style:italic}
.chat-i{display:flex;gap:4px;padding:6px;border-top:.5px solid rgba(232,168,56,.04)}
.ci{flex:1;background:rgba(232,168,56,.02);border:.5px solid rgba(232,168,56,.08);border-radius:3px;padding:6px;color:rgba(232,168,56,.6);font-family:'Courier New',monospace;font-size:9px;outline:none;resize:none}
.ci::placeholder{color:rgba(232,168,56,.12)}
.cs{background:rgba(232,168,56,.08);border:.5px solid rgba(232,168,56,.15);border-radius:3px;padding:6px 10px;color:rgba(232,168,56,.5);cursor:pointer;font-family:'Courier New',monospace;font-size:8px}
.cbox{font-size:7px;color:rgba(232,168,56,.2);line-height:1.4;padding:4px}
.info{position:absolute;bottom:6px;left:8px;font-size:7px;color:rgba(232,168,56,.12);z-index:1}
.cl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:rgba(232,168,56,.08);letter-spacing:3px;pointer-events:none;z-index:1}
.ab{display:none;font-size:7px;color:rgba(100,220,165,.5);background:rgba(100,220,165,.06);border:.5px solid rgba(100,220,165,.1);border-radius:2px;padding:2px 6px;text-align:center}
</style>
</head>
<body>
<div class="app">
<div id="cw"><canvas id="c"></canvas><div class="cl" id="cl">LATENT SPACE</div><div class="info" id="info"></div></div>
<div class="sb">
  <div class="title">BLIND BRAIN DISCOVERY</div>
  <div class="sub">no labels. no guidance. just truth.</div>
  <button class="btn" id="btn-go" onclick="go()">Begin Discovery</button>
  <div class="ab" id="ab">BRAIN ALIVE</div>
  <div class="sec"><div id="ph" style="font-size:8px;color:rgba(232,168,56,.3)">waiting</div><div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div></div>
  <div class="sec"><div class="st">DIRECTIONS <span id="dc">0</span></div><div class="dl" id="dl"></div></div>
  <div class="sec"><div class="st">SELECTED</div><div class="cbox" id="cb">click a direction to inspect</div></div>
  <div class="sec"><div class="st">LOG</div><div class="log" id="log"></div></div>
  <div class="chat-wrap" id="cw2">
    <div class="chat-h">CONVERSE WITH THE BRAIN</div>
    <div class="chat-m" id="cm"></div>
    <div class="chat-i"><textarea class="ci" id="cin" rows="2" placeholder="say something..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chat()}"></textarea><button class="cs" onclick="chat()">send</button></div>
  </div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(),cam=new THREE.PerspectiveCamera(50,1,.1,100);cam.position.set(0,0,3.2);
const ren=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
ren.setClearColor(0x050608,1);
function resize(){const w=document.getElementById('cw');ren.setSize(w.clientWidth,w.clientHeight);cam.aspect=w.clientWidth/w.clientHeight;cam.updateProjectionMatrix()}
resize();window.addEventListener('resize',resize);
const brain=new THREE.Group();scene.add(brain);

// Ambient particles: thousands of tiny dots forming a spherical cloud
const N=2000,ambGeo=new THREE.BufferGeometry(),ap=new Float32Array(N*3),ac=new Float32Array(N*3);
for(let i=0;i<N;i++){
  const r=.3+Math.random()*.7,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
  ap[i*3]=r*Math.sin(ph)*Math.cos(th);ap[i*3+1]=r*Math.sin(ph)*Math.sin(th);ap[i*3+2]=r*Math.cos(ph);
  const b=.3+Math.random()*.7;ac[i*3]=.91*b;ac[i*3+1]=.66*b;ac[i*3+2]=.22*b;
}
ambGeo.setAttribute('position',new THREE.BufferAttribute(ap,3));
ambGeo.setAttribute('color',new THREE.BufferAttribute(ac,3));
brain.add(new THREE.Points(ambGeo,new THREE.PointsMaterial({size:.003,vertexColors:true,transparent:true,opacity:.6})));

// Structure rings: thin line circles at different angles
for(let i=0;i<5;i++){
  const pts=[];const segs=80;const r=.5+i*.08;
  for(let j=0;j<=segs;j++){const a=j/segs*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*r,Math.sin(a)*r,0))}
  const ring=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xe8a838,transparent:true,opacity:.04+i*.01}));
  ring.rotation.x=Math.random()*Math.PI;ring.rotation.y=Math.random()*Math.PI;
  ring.userData={speed:.0005+i*.0003};brain.add(ring);
}

// Wireframe icosphere
const icoGeo=new THREE.IcosahedronGeometry(.55,2);
brain.add(new THREE.LineSegments(new THREE.WireframeGeometry(icoGeo),new THREE.LineBasicMaterial({color:0xe8a838,transparent:true,opacity:.03})));

// Node system: use a dynamic point cloud for discovered directions
const MAX_NODES=100;
const nodeGeo=new THREE.BufferGeometry();
const nodePos=new Float32Array(MAX_NODES*3);
const nodeCol=new Float32Array(MAX_NODES*3);
const nodeSiz=new Float32Array(MAX_NODES);
nodeGeo.setAttribute('position',new THREE.BufferAttribute(nodePos,3));
nodeGeo.setAttribute('color',new THREE.BufferAttribute(nodeCol,3));
nodeGeo.setAttribute('size',new THREE.BufferAttribute(nodeSiz,1));

// Custom shader for variable-size points
const nodeMatV=`attribute float size;attribute vec3 color;varying vec3 vc;void main(){vc=color;vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=size*(200.0/-mv.z);gl_Position=projectionMatrix*mv;}`;
const nodeMatF=`varying vec3 vc;void main(){float d=length(gl_PointCoord-vec2(.5));if(d>.5)discard;float a=1.0-d*2.0;gl_FragColor=vec4(vc,a*a);}`;
const nodeMat=new THREE.ShaderMaterial({vertexShader:nodeMatV,fragmentShader:nodeMatF,transparent:true,depthWrite:false});
const nodePoints=new THREE.Points(nodeGeo,nodeMat);
brain.add(nodePoints);

const edgeGroup=new THREE.Group();brain.add(edgeGroup);
const nodeMap={};let nodeCount=0;

// Label sprites
const labels=[];
function addLabel(name,x,y,z,color){
  const cv=document.createElement('canvas');cv.width=128;cv.height=32;
  const ctx=cv.getContext('2d');ctx.fillStyle=color;ctx.font='11px Courier New';ctx.textAlign='center';ctx.fillText(name,64,20);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:.35}));
  sp.position.set(x,y+.06,z);sp.scale.set(.18,.045,1);brain.add(sp);labels.push({sprite:sp,name});
  return sp;
}

function hexToRGB(hex){const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;return[r,g,b]}

function setNode(name,x,y,z,color,strength,activation){
  const s=.55+strength*.03;x*=s;y*=s;z*=s;
  const act=Math.min(1,.2+Math.abs(activation||0)*4);
  const sz=.8+act*2+strength*.1;
  const[cr,cg,cb]=hexToRGB(color||'#e8a838');
  if(name in nodeMap){
    const idx=nodeMap[name];
    nodePos[idx*3]=x;nodePos[idx*3+1]=y;nodePos[idx*3+2]=z;
    nodeCol[idx*3]=cr*act;nodeCol[idx*3+1]=cg*act;nodeCol[idx*3+2]=cb*act;
    nodeSiz[idx]=sz;
  }else{
    const idx=nodeCount;nodeMap[name]=idx;nodeCount++;
    nodePos[idx*3]=x;nodePos[idx*3+1]=y;nodePos[idx*3+2]=z;
    nodeCol[idx*3]=cr;nodeCol[idx*3+1]=cg;nodeCol[idx*3+2]=cb;
    nodeSiz[idx]=sz;
    addLabel(name,x,y,z,color||'#e8a838');
  }
  nodeGeo.attributes.position.needsUpdate=true;
  nodeGeo.attributes.color.needsUpdate=true;
  nodeGeo.attributes.size.needsUpdate=true;
  nodeGeo.setDrawRange(0,nodeCount);
}

function rebuildEdges(interactions){
  while(edgeGroup.children.length)edgeGroup.remove(edgeGroup.children[0]);
  for(const ix of interactions){
    const si=nodeMap[ix.source],ti=nodeMap[ix.target];
    if(si===undefined||ti===undefined)continue;
    const p1=new THREE.Vector3(nodePos[si*3],nodePos[si*3+1],nodePos[si*3+2]);
    const p2=new THREE.Vector3(nodePos[ti*3],nodePos[ti*3+1],nodePos[ti*3+2]);
    const c=ix.strength>0?0xe8a838:0xc04030;
    edgeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1,p2]),
      new THREE.LineBasicMaterial({color:c,transparent:true,opacity:Math.min(.15,Math.abs(ix.strength)*.2)})));
  }
}

let mx=0,my=0,drag=false;
document.getElementById('cw').addEventListener('mousedown',()=>drag=true);
document.addEventListener('mouseup',()=>drag=false);
document.addEventListener('mousemove',e=>{if(drag){mx+=e.movementX*.003;my+=e.movementY*.003}});

let ar=0;
function anim(){
  requestAnimationFrame(anim);ar+=.001;
  brain.rotation.y=ar+mx;brain.rotation.x=my*.4;
  // Rotate rings
  brain.children.forEach(c=>{if(c.userData&&c.userData.speed)c.rotation.z+=c.userData.speed});
  // Shimmer ambient particles
  const t=Date.now()*.001;const pp=ambGeo.attributes.position.array;
  for(let i=0;i<N;i++){
    const idx=i*3;
    const ox=pp[idx],oy=pp[idx+1],oz=pp[idx+2];
    const d=Math.sqrt(ox*ox+oy*oy+oz*oz);
    if(d>.01){const f=1+Math.sin(t+i*.1)*.001;pp[idx]*=f;pp[idx+1]*=f;pp[idx+2]*=f;
      const nd=Math.sqrt(pp[idx]**2+pp[idx+1]**2+pp[idx+2]**2);
      if(nd>1.1||nd<.25){const sc=(.3+Math.random()*.7)/nd;pp[idx]*=sc;pp[idx+1]*=sc;pp[idx+2]*=sc}}
  }
  ambGeo.attributes.position.needsUpdate=true;
  // Pulse node sizes
  for(let i=0;i<nodeCount;i++){
    const base=nodeSiz[i];
    nodeSiz[i]=base+Math.sin(t*3+i)*.05;
  }
  nodeGeo.attributes.size.needsUpdate=true;
  ren.render(scene,cam);
}
anim();

let prevEC=0;
async function poll(){
  try{
    const r=await fetch('/api/state');if(!r.ok)return;const d=await r.json();
    document.getElementById('ph').textContent=d.message||d.phase;
    document.getElementById('pf').style.width=(d.progress*100)+'%';
    const dims=d.dimensions||{},acts=d.activations||{},names=Object.keys(dims);
    document.getElementById('dc').textContent=names.length;
    let h='';
    for(const n of names){
      const v=dims[n],a=acts[n]||0;
      setNode(n,v.x,v.y,v.z,v.color,v.strength||1,a);
      h+=`<div class="di" onclick="sel('${n}')"><div class="dd" style="background:${v.color}"></div>${n}</div>`;
    }
    document.getElementById('dl').innerHTML=h;
    if((d.interactions||[]).length!==prevEC){rebuildEdges(d.interactions||[]);prevEC=(d.interactions||[]).length}
    document.getElementById('log').innerHTML=(d.log||[]).slice(-15).map(l=>`<div class="le">${l.msg}</div>`).join('');
    document.getElementById('log').scrollTop=999999;
    document.getElementById('info').textContent=`directions: ${names.length} | connections: ${prevEC} | activity: ${(d.brain_activity||0).toFixed(3)}`;
    if(d.alive){
      document.getElementById('cw2').style.display='flex';
      document.getElementById('ab').style.display='block';
      document.getElementById('cl').textContent='';
      document.getElementById('btn-go').style.display='none';
    }
  }catch(e){}
}

function sel(name){
  fetch('/api/state').then(r=>r.json()).then(d=>{
    const dim=d.dimensions[name];if(!dim)return;
    const c=dim.char||{},a=(d.activations||{})[name]||0;
    let h=`<b style="color:rgba(232,168,56,.6)">${name}</b> [${a.toFixed(3)}]<br>`;
    if(c.positive)h+=`+: ${c.positive.slice(0,60)}<br>`;
    if(c.negative)h+=`-: ${c.negative.slice(0,60)}`;
    document.getElementById('cb').innerHTML=h;
    // Flash the node
    const idx=nodeMap[name];if(idx!==undefined){nodeSiz[idx]=5;setTimeout(()=>{nodeSiz[idx]=1.5},800)}
  });
}

function addMsg(t,txt){const d=document.createElement('div');d.className='msg m'+t;d.textContent=txt;document.getElementById('cm').appendChild(d);document.getElementById('cm').scrollTop=999999}

async function chat(){
  const inp=document.getElementById('cin'),msg=inp.value.trim();if(!msg)return;
  inp.value='';addMsg('u',msg);addMsg('s','thinking...');
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const d=await r.json();document.getElementById('cm').lastChild.remove();
    addMsg('a',d.response);
    if(d.top_active)addMsg('s','active: '+d.top_active.map(x=>`${x.dim}:${x.val}`).join(' '));
  }catch(e){document.getElementById('cm').lastChild.remove();addMsg('s','error')}
}

async function go(){
  document.getElementById('btn-go').disabled=true;document.getElementById('btn-go').textContent='discovering...';
  document.getElementById('cl').textContent='GROWING';
  await fetch('/api/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rounds:3,dirs:15})});
}

setInterval(poll,300);poll();
</script>
</body>
</html>

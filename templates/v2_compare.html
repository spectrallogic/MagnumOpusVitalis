<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magnum Opus Vitalis v2 — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f5f6f8; color: #1a1a2e; font-size: 13px; line-height: 1.45;
  }
  header {
    background: #fff; border-bottom: 1px solid #dee2e6;
    padding: 10px 18px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header h1 span { color: #6c757d; font-weight: 400; }
  header .pulse {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #2ecc71; margin-left: 8px; box-shadow: 0 0 6px #2ecc71;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  header button {
    padding: 5px 10px; border: 1px solid #dee2e6; border-radius: 4px;
    background: #fff; color: #495057; font-size: 12px; cursor: pointer; margin-left: 4px;
  }
  header button:hover { background: #e9ecef; }

  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #dee2e6;
            height: calc(100vh - 44px - 70px); }
  .pane { background: #fff; display: flex; flex-direction: column; overflow: hidden; }
  .pane-head {
    padding: 7px 12px; border-bottom: 1px solid #e9ecef; background: #f8f9fa;
    font-size: 11px; font-weight: 600; color: #6c757d; text-transform: uppercase;
    letter-spacing: 0.4px; display: flex; justify-content: space-between;
  }
  .pane-body { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .turn { margin-bottom: 14px; }
  .turn .who { font-size: 11px; color: #adb5bd; text-transform: uppercase; margin-bottom: 2px; }
  .turn .text { white-space: pre-wrap; }
  .raw .text { color: #6c757d; }
  .engine .text { color: #1a1a2e; font-weight: 500; }
  .you .text { color: #0d6efd; font-style: italic; }
  .auto .text { color: #d63384; font-style: italic; }
  .auto .who { color: #d63384; }

  .metrics {
    background: #fff; padding: 8px 14px; border-top: 1px solid #dee2e6;
    height: 70px; overflow-x: auto; white-space: nowrap; font-family: ui-monospace, monospace;
    font-size: 11px; color: #495057; line-height: 1.6;
  }
  .metric-row { display: block; }
  .label { color: #adb5bd; }
  .pos { color: #198754; } .neg { color: #dc3545; }
  .chem-c { color: #dc3545; } .chem-d { color: #ffc107; }
  .chem-s { color: #198754; } .chem-ne { color: #6610f2; }

  .input-bar {
    position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
    border-top: 1px solid #dee2e6; padding: 8px 14px;
    display: flex; gap: 8px; align-items: center;
  }
  .input-bar input {
    flex: 1; padding: 8px 10px; border: 1px solid #dee2e6; border-radius: 4px;
    font-size: 13px;
  }
  .input-bar button {
    padding: 8px 18px; background: #0d6efd; color: #fff; border: 0;
    border-radius: 4px; cursor: pointer; font-weight: 500;
  }
  .input-bar button:hover { background: #0b5ed7; }
  .input-bar button:disabled { background: #adb5bd; cursor: wait; }

  .quick { display: flex; gap: 4px; flex-wrap: wrap; padding: 6px 14px; background: #f8f9fa;
           border-top: 1px solid #e9ecef; }
  .quick button {
    padding: 3px 8px; border: 1px solid #dee2e6; border-radius: 3px; background: #fff;
    font-size: 11px; cursor: pointer; color: #495057;
  }
  .quick button:hover { background: #e9ecef; }
</style>
</head>
<body>

<header>
  <h1>Magnum Opus Vitalis <span>v2 Live</span><span class="pulse" id="pulse"></span></h1>
  <div>
    <span id="ticks" style="font-size:11px; color:#6c757d; margin-right:14px;">flow: 0</span>
    <button onclick="resetAll()">Reset</button>
  </div>
</header>

<div class="layout">
  <div class="pane raw">
    <div class="pane-head"><span>Raw model</span><span style="color:#adb5bd">no steering</span></div>
    <div class="pane-body" id="raw-body"></div>
  </div>
  <div class="pane engine">
    <div class="pane-head"><span>v2 engine</span><span id="state-tag" style="color:#adb5bd">substrate alive</span></div>
    <div class="pane-body" id="engine-body"></div>
  </div>
</div>

<div class="metrics" id="metrics">loading…</div>

<div class="quick">
  <button onclick="stim({joy: 0.8})">+joy</button>
  <button onclick="stim({fear: 0.8, desperate: 0.5})">+fear/desp</button>
  <button onclick="stim({anger: 0.8})">+anger</button>
  <button onclick="stim({sadness: 0.8})">+sad</button>
  <button onclick="stim({calm: 0.8, trust: 0.5})">+calm/trust</button>
  <button onclick="stim({curious: 0.8, surprise: 0.4})">+curious</button>
  <button onclick="stim({disgust: 0.8})">+disgust</button>
</div>

<div class="input-bar">
  <input id="prompt" placeholder="Type a message... (engine never stops thinking between turns)"
         onkeydown="if(event.key==='Enter') send()" autofocus>
  <button id="send-btn" onclick="send()">Send</button>
</div>

<script>
const rawBody = document.getElementById('raw-body');
const engBody = document.getElementById('engine-body');
const metrics = document.getElementById('metrics');
const ticksEl = document.getElementById('ticks');
const sendBtn = document.getElementById('send-btn');
const promptEl = document.getElementById('prompt');

function fmt(n, p=2) { return (n ?? 0).toFixed(p); }
function colorVal(v) {
  if (v > 0) return `<span class="pos">+${fmt(v,2)}</span>`;
  if (v < 0) return `<span class="neg">${fmt(v,2)}</span>`;
  return fmt(v,2);
}

function appendTurn(side, who, text, klass='') {
  const pane = side === 'raw' ? rawBody : engBody;
  const div = document.createElement('div');
  div.className = 'turn ' + klass;
  div.innerHTML = `<div class="who">${who}</div><div class="text">${text}</div>`;
  pane.appendChild(div);
  pane.scrollTop = pane.scrollHeight;
}

async function send() {
  const text = promptEl.value.trim();
  if (!text) return;
  promptEl.value = '';
  sendBtn.disabled = true;
  appendTurn('raw', 'you', text, 'you');
  appendTurn('engine', 'you', text, 'you');
  try {
    const res = await fetch('/api/converse', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt: text}),
    });
    const j = await res.json();
    const rawSuffix = (j.raw || '').slice(text.length).trim() || j.raw || '(empty)';
    const engSuffix = (j.engine || '').slice(text.length).trim() || j.engine || '(empty)';
    appendTurn('raw', 'gpt2', rawSuffix);
    appendTurn('engine', 'v2', engSuffix);
  } catch(e) {
    appendTurn('engine', 'error', String(e));
  } finally {
    sendBtn.disabled = false;
    promptEl.focus();
  }
}

async function stim(emotions) {
  await fetch('/api/stimulate', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({emotions}),
  });
}

async function resetAll() {
  if (!confirm('Reset bus, memory pool, and emotion state?')) return;
  await fetch('/api/reset', {method: 'POST'});
  rawBody.innerHTML = '';
  engBody.innerHTML = '';
}

async function refresh() {
  try {
    const res = await fetch('/api/snapshot');
    const s = await res.json();
    if (s.error) { metrics.textContent = s.error; return; }

    const b = s.bus || {};
    const n = s.neuromod || {};
    const l = (s.limbic && s.limbic.blended) || {};
    const sub = s.subconscious || {};
    const e = s.executive || {};
    const m = s.memory || {};
    const sal = s.salience || {};
    const dm = s.default_mode || {};
    const sp = s.sparks || {};
    const t = s.temporal || {};

    const top3 = Object.entries(l).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).slice(0,3);
    const topStr = top3.map(([k,v])=>`${k}=${colorVal(v)}`).join(' ');

    metrics.innerHTML = `
      <div class="metric-row">
        <span class="label">bus</span> norm=${fmt(b.state_norm,2)} vel=${fmt(b.velocity_norm,2)} div=${fmt(b.divergence,3)} &nbsp;
        <span class="label">chem</span>
          <span class="chem-c">cort=${fmt(n.cortisol,2)}</span>
          <span class="chem-d">dop=${fmt(n.dopamine,2)}</span>
          <span class="chem-s">ser=${fmt(n.serotonin,2)}</span>
          <span class="chem-ne">ne=${fmt(n.norepinephrine,2)}</span> &nbsp;
        <span class="label">exec</span> p=${fmt(e.pressure,2)}/${fmt(e.effective_threshold,2)} fresh=${fmt(e.freshness,2)} &nbsp;
        <span class="label">mem</span> ${m.size||0} (${m.n_false||0} false)
      </div>
      <div class="metric-row">
        <span class="label">subc</span> intrusive=${sub.intrusive_source||'-'} ${sub.surprise?'(!)':''}
          conf=${fmt(sub.intrusive_confidence,2)} sal_gain=${fmt(sal.gain,2)} novelty=${fmt(sal.novelty,2)} &nbsp;
        <span class="label">drift</span> ${dm.n_events||0} events
        ${dm.last_event ? '('+dm.last_event.emotion+' '+colorVal(dm.last_event.projection)+')' : ''} &nbsp;
        <span class="label">sparks</span> ${sp.fires_total||0} fires &nbsp;
        <span class="label">subj_t</span> ${fmt(t.subjective_elapsed,2)} &nbsp;
        <span class="label">emo</span> ${topStr}
      </div>
    `;

    const fm = s.flow_metrics || {};
    ticksEl.textContent = `flow: ${(fm.flow||{}).ticks||0}  perc: ${(fm.perception||{}).ticks||0}  exp: ${(fm.expensive||{}).ticks||0}  slow: ${(fm.slow||{}).ticks||0}`;

    // Drain autonomous speech queue
    const aRes = await fetch('/api/autonomous');
    const aJ = await aRes.json();
    for (const msg of (aJ.messages || [])) {
      appendTurn('engine', 'auto', msg.text, 'auto');
    }
  } catch(e) {
    metrics.textContent = 'snapshot error: ' + e.message;
  }
}
setInterval(refresh, 500);
refresh();
</script>
</body>
</html>
